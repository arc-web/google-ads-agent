# Google Ads Agent Supabase Configuration
# Campaign management and advertising automation system

project_id = "google-ads-agent"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "graphql_public"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[db]
port = 54322
shadow_port = 54320
major_version = 15

[realtime]
enabled = true
ip_version = "ipv4"

[rest]
enabled = true

[storage]
enabled = true
file_size_limit = "200MiB"

[edge_functions]
enabled = true

[analytics]
enabled = true