# Google Ads Campaign Defaults
# Active workflow: Search-first Google Ads Editor staging.

active_workflow:
  campaign_type: "Search"
  staging_environment: "Google Ads Editor"
  default_keyword_criterion_type: "Phrase"
  negative_keyword_criterion_type: "Negative Phrase"
  broad_match_keywords: "Off"
  exact_match_enabled: false
  pmax_enabled: false
  api_upload_enabled: false

search_campaigns:
  default:
    budget_daily: 100.00
    budget_type: "Daily"
    languages: ["en"]
    bid_strategy: "Maximize conversions"
    ad_schedule: ""
    networks: ["Google search"]
    status: "Paused"
    eu_political_ads: "No"
    broad_match_keywords: "Off"
    keyword_criterion_type: "Phrase"
    rsa_headlines_required: 15
    rsa_descriptions_required: 4
    output_encoding: "utf-16"
    output_delimiter: "tab"

  manual_cpc:
    bid_strategy: "Manual CPC"
    max_cpc: 2.50

  target_cpa:
    bid_strategy: "Target CPA"
    target_cpa: 25.00

  target_roas:
    bid_strategy: "Target ROAS"
    target_roas: 400

  maximize_clicks:
    bid_strategy: "Maximize clicks"
    max_cpc: 1.50

inactive_campaign_types:
  performance_max:
    status: "salvage_only"
    activation_required: true
    reason: "PMAX is not part of the active Search staging workflow."

  display:
    status: "salvage_only"
    activation_required: true
    reason: "Display is not part of the active Search staging workflow."

  shopping:
    status: "salvage_only"
    activation_required: true
    reason: "Shopping is not part of the active Search staging workflow."

  video:
    status: "salvage_only"
    activation_required: true
    reason: "Video is not part of the active Search staging workflow."

  app:
    status: "salvage_only"
    activation_required: true
    reason: "App campaigns are not part of the active Search staging workflow."

  discovery:
    status: "salvage_only"
    activation_required: true
    reason: "Discovery is not part of the active Search staging workflow."

  local:
    status: "salvage_only"
    activation_required: true
    reason: "Local Services campaigns are not part of the active Search staging workflow."

campaign_type_selection:
  rules:
    lead_generation:
      recommended_types: ["Search"]
      primary_bid_strategy: "Maximize conversions"

    sales_conversion:
      recommended_types: ["Search"]
      primary_bid_strategy: "Maximize conversions"

    local_services:
      recommended_types: ["Search"]
      primary_bid_strategy: "Maximize conversions"

global_settings:
  languages: ["en"]
  start_date: null
  end_date: null
  status: "Paused"
  conversion_tracking: true
  auto_tagging: true

geographic:
  national_location_id: "2840"
  expansion:
    include_similar_locations: false
    include_people_searching: false
    include_people_viewing: false
  bid_adjustments: {}
