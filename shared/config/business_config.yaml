# Generic Business Configuration
# Client-specific business facts belong under clients/{agency}/{client}/.

business:
  name: "Generic Client"
  industry: "To be defined from client onboarding"
  target_audience: "To be defined from client onboarding"

  brand_guidelines:
    enabled: false
    tone: "Clear, factual, client-specific"
    prohibited_terms: []
    required_terms: []
    never_use_terms: []

  content_standards:
    require_proofreading: true
    allow_emojis: false
    allow_exclamation_points: false
    enforce_perfect_grammar: true
    require_factual_accuracy: true

  compliance:
    gdpr_compliant: false
    ccpa_compliant: false
    industry_regulations: []

  services: []

  business_type_classification:
    online_business:
      indicators:
        - "online services"
        - "digital platform"
        - "remote consultations"
        - "virtual appointments"
      keyword_rules:
        must_include: []
        never_include: []
        acceptable_alternatives:
          - "virtual"
          - "remote"
          - "online"

    physical_business:
      indicators:
        - "brick-and-mortar"
        - "local customers"
        - "in-person services"
        - "retail store"
        - "office location"
        - "service area"
      keyword_rules:
        must_include: []
        never_include: []
        acceptable_alternatives:
          - "in-person"
          - "local service"

    verification_required: true
