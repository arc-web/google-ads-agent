# Google Ads Format Limits
# Maximum number of elements per ad format
# Reference: https://support.google.com/google-ads/answer/1704390

limits:
  # Text & Responsive Search Ads (RSA)
  headlines_max: 15
  descriptions_max: 4

  # Performance Max reference only. PMAX is not active in the current workflow.
  long_headlines_max: 5

  # Sitelink Extensions
  sitelinks_max: 6

  # Callout Extensions
  callouts_max: 20

  # Search Theme Assets (RSA)
  search_themes_max: 10

# Business-specific overrides belong under clients/{agency}/{client}/.
business_overrides: {}
